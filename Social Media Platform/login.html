<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Media</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <main class="auth-page">
        <section class="auth-card">
            <div class="logo">
                <img src="Icons/IMG_0999.PNG" alt=""></img>
            </div>
            <div class="title-row">
                <a href="login.html"><h2>Login</h2></a>
                <a href="register.html"><h1>Register</h1></a>
            </div>
            
            <form id="login-form">
                <label for="loginEmail">Email</label>
                <div class="input-box">
                    <img src="Icons/mail.svg" alt=""></img>
                    <input type="email" id="loginEmail" required>
                </div>
                <label for="loginPassword">Password</label>
                <div class="input-box">
                    <img src="Icons/lock-keyhole.svg" alt=""></img>
                    <input type="password" id="loginPassword" required>
                </div>
                <button type="submit">Login</button>
            </form>
            <p class="login-link">Dont have an account? <a href="register.html">Register</a></p>
        </section>
    </main>
</body>
</html>
