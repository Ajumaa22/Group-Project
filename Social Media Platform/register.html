<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <main class="auth-page">
        <section class="auth-card">
            <div class="logo">
                <img src="Icons/IMG_0999.PNG" alt=""></img>
            </div>
            
            <div class="title-row">
                <a href="login.html"><h1>Login</h1></a>
                <a href="register.html"><h2>Register</h2></a>
            </div>
            <form id="register-form">
                <div class="input-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" required>
                    <label for="email">Email</label>
                    <input type="email" id="email" required>
                    <label for="password">Password</label>
                    <input type="password" id="password" required>
                    <label for="confirmPassword">Confirm Password</label>
                    <input type="password" id="confirmPassword" required>
                    <label for="dob">Date of Birth</label>
                    <input type="date" id="dob">
                    <div class="btn-row">
                    <button class="register-btn" type="submit">Register</button>
                    <button class="register-btn" type="reset">Reset</button>
                    </div>
                </div>
                
            </form>
        <p class="login-link">Alredy have an Account? <a href="login.html">Login</a></p>
        </section>
    </main>
    <script src="js/auth.js"></script>
</body>
</html>
