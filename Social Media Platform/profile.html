<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>User Profile</title>
    <link rel="stylesheet" href="css/profile.css">
</head>

<body>

<nav>
    <a href="index.html">Home</a>
    <a href="profile.html">Profile</a>
    <a href="#posts-section">Posts</a>
</nav>


<main>
    <section>
        <header class="profile-box">
        <div class="profile-header">    
            <div class="profile-pic">
                <img src="Icons/IMG_1049.PNG" alt="profile-pic">
            </div>
            <div class="profile-info">
                <h1>john_doe</h1>
                <p>Web development student who enjoys building websites</p>
                
            </div>
            </div>
            <div class="profile-details">
            <div class="profile-n">
                <h2 id="followersCount">0</h2>
                <p>Followers</p>
            </div>
            <div class="stat-divider"></div>
            <div class="profile-n">
                <h2 id="followingCount">0</h2>
                <p>Following</p>
            </div>
            <div class="stat-divider"></div>
            <div class="profile-n">
                <h2 id="postsCount">0</h2>
                <p>Posts</p>
            </div>
        </div>
        <button id="edit-Btn">Edit profile</button>
            
        </header>

    </section>

   
    <section class="posts" id="posts-section">
        <h2>Posts</h2>
        <div class="posts-box">
            <form enctype="multipart/form-data" id="postForm">
                <div class="post-action">
                    <img src="Icons/IMG_1049.PNG" alt="profile-pic">
                    <textarea name="post_text" placeholder="What's on your mind?" required></textarea>
                </div>
                <div class="post-upload">
                    <label>Upload Photo:</label>
                    <input type="file" name="photo" accept="image/*">
                    <button type="submit">Post</button>
                </div>
            </form>
        </div>

        <div id="userPostsContainer">
            <!-- User's posts will be displayed here -->
        </div>

    </section>

</main>


<footer>
    <p>© 2026 Social media Platform</p>
</footer>
<script src="js/auth.js"></script>
<script src="js/app.js"></script>
</body>
</html>
