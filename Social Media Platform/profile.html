<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>User Profile</title>
    <link rel="stylesheet" href="css/profile.css">
</head>

<body>

<nav>
    <a href="#">Home</a>
    <a href="#">Profile</a>
    <a href="#">Posts</a>
</nav>


<main>
    <section>
        <header class="profile-box">
        <div class="cover-wrap">    
            <div class="profile-pic">
                <img src="Icons/IMG_1049.PNG" alt="profile-pic">
            </div>
            <div class="profile-info">
                <h1>john_doe</h1>
                <p>Web development student who enjoys building websites.</p>
                <button id="edit-Btn">edit profile</button>
            </div>
            </div>
            <div class="profile-details">
            <div class="profile-n">
                <h2>0</h2>
                <p>Followers</p>
            </div>
            <div class="stat-divider"></div>
            <div class="profile-n">
                <h2>0</h2>
                <p>Following</p>
            </div>
            <div class="stat-divider"></div>
            <div class="profile-n">
                <h2>0</h2>
                <p>Posts</p>
            </div>
        </div>
            
        </header>

    </section>

   
    <section>
        <h2>User Posts</h2>

        <section>
            <h3>Create New Post</h3>
            <form enctype="multipart/form-data">
                <label>Post Text:</label>
                <textarea name="post_text" placeholder="What's on your mind?"></textarea>
                <br><br>
                <label>Upload Photo:</label>
                <input type="file" name="photo" accept="image/*">
                <br><br>
                <button type="submit">Post</button>
            </form>
        </section>

      

        

    </section>

</main>


<footer>
    <p>© 2026 Social media Platform</p>
</footer>
<script src="js/auth.js"></script>
</body>
</html>
