<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>User Profile</title>
    <link rel="stylesheet" href="css/profile.css">
    <link rel="stylesheet" href="css/responsive.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>

<nav>
    <a href="index.html">Home</a>
   
</nav>

<main>
    <section>
        <header class="profile-box">

            <div class="profile-header">    
                <div class="profile-pic">
                    <img id="profileImage" src="icons/user-round (1).svg" alt="profile-pic">
                </div>

                <div class="profile-info">
                    <h1 id="username">username</h1>
                    <p id="bio">No bio yet</p>
                </div>
            </div>

            <div class="profile-details">
                <div class="profile-n">
                    <h2 id="followersCount">0</h2>
                    <p>Followers</p>
                </div>

                <div class="stat-divider"></div>

                <div class="profile-n">
                    <h2 id="followingCount">0</h2>
                    <p>Following</p>
                </div>

                <div class="stat-divider"></div>

                <div class="profile-n">
                    <h2 id="postsCount">0</h2>
                    <p>Posts</p>
                </div>
            </div>

            <button id="edit-Btn">Edit profile</button>

        </header>
    </section>

    <section id="postsContainer"></section>
</main>

<footer>
    <p>© 2026 Social media Platform</p>
</footer>

<div id="postModal" class="post-modal hidden">
    <div class="post-modal-content">
        <button id="closePostModal" class="close-post-modal">&times;</button>
        <div id="postModalBody"></div>
    </div>
</div>

<script src="js/auth.js"></script>
<script src="js/profile.js"></script>
</body>
</html>
